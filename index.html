<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Teams Layout</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Red Bull -->
        <div class="team-section">
            <div class="team-row red-bull">
                <div class="driver driver-left">
                    <img src="images/drivers/verstappen.png" alt="Verstappen" class="driver-image">
                </div>
                <div class="team-logo">
                    <a href="https://www.redbullracing.com" class="logo-link">
                        <img src="images/logos/redbull.png" alt="Red Bull Racing" class="logo-image">
                    </a>
                </div>
                <div class="driver driver-right">
                    <img src="images/drivers/lawson.png" alt="Lawson" class="driver-image">
                </div>
            </div>
            <div class="names-row">
                <div class="name-left">VERSTAPPEN</div>
                <div class="name-right">LAWSON</div>
            </div>
        </div>
        
        <!-- Mercedes -->
        <div class="team-section">
            <div class="team-row mercedes">
                <div class="driver driver-left">
                    <img src="images/drivers/russell.png" alt="Russell" class="driver-image">
                </div>
                <div class="team-logo">
                    <a href="https://www.mercedesamgf1.com" class="logo-link">
                        <img src="images/logos/mercedes.png" alt="Mercedes" class="logo-image">
                    </a>
                </div>
                <div class="driver driver-right">
                    <img src="images/drivers/antonelli.png" alt="Antonelli" class="driver-image">
                </div>
            </div>
            <div class="names-row">
                <div class="name-left">RUSSELL</div>
                <div class="name-right">ANTONELLI</div>
            </div>
        </div>
        
        <!-- Ferrari -->
        <div class="team-section">
            <div class="team-row ferrari">
                <div class="driver driver-left">
                    <img src="images/drivers/leclerc.png" alt="Leclerc" class="driver-image">
                </div>
                <div class="team-logo">
                    <a href="https://www.ferrari.com/en-EN/formula1" class="logo-link">
                        <img src="images/logos/ferrari.png" alt="Ferrari" class="logo-image">
                    </a>
                </div>
                <div class="driver driver-right">
                    <img src="images/drivers/hamilton.png" alt="Hamilton" class="driver-image">
                </div>
            </div>
            <div class="names-row">
                <div class="name-left">LECLERC</div>
                <div class="name-right">HAMILTON</div>
            </div>
        </div>
        
        <!-- McLaren -->
        <div class="team-section">
            <div class="team-row mclaren">
                <div class="driver driver-left">
                    <img src="images/drivers/norris.png" alt="Norris" class="driver-image">
                </div>
                <div class="team-logo">
                    <a href="https://www.mclaren.com/racing" class="logo-link">
                        <img src="images/logos/mclaren.png" alt="McLaren" class="logo-image">
                    </a>
                </div>
                <div class="driver driver-right">
                    <img src="images/drivers/piastri.png" alt="Piastri" class="driver-image">
                </div>
            </div>
            <div class="names-row">
                <div class="name-left">NORRIS</div>
                <div class="name-right">PIASTRI</div>
            </div>
        </div>
        
        <!-- Aston Martin -->
        <div class="team-section">
            <div class="team-row aston-martin">
                <div class="driver driver-left">
                    <img src="images/drivers/alonso.png" alt="Alonso" class="driver-image">
                </div>
                <div class="team-logo">
                    <a href="https://www.astonmartinf1.com" class="logo-link">
                        <img src="images/logos/aston-martin.png" alt="Aston Martin" class="logo-image">
                    </a>
                </div>
                <div class="driver driver-right">
                    <img src="images/drivers/stroll.png" alt="Stroll" class="driver-image">
                </div>
            </div>
            <div class="names-row">
                <div class="name-left">ALONSO</div>
                <div class="name-right">STROLL</div>
            </div>
        </div>
        
        <!-- Alpine -->
        <div class="team-section">
            <div class="team-row alpine">
                <div class="driver driver-left">
                    <img src="images/drivers/gasly.png" alt="Gasly" class="driver-image">
                </div>
                <div class="team-logo">
                    <a href="https://www.alpinecars.com/en/formula-1" class="logo-link">
                        <img src="images/logos/alpine.png" alt="Alpine" class="logo-image">
                    </a>
                </div>
                <div class="driver driver-right">
                    <img src="images/drivers/doohan.png" alt="Doohan" class="driver-image">
                </div>
            </div>
            <div class="names-row">
                <div class="name-left">GASLY</div>
                <div class="name-right">DOOHAN</div>
            </div>
        </div>
        
        <!-- RB -->
        <div class="team-section">
            <div class="team-row rb">
                <div class="driver driver-left">
                    <img src="images/drivers/tsunoda.png" alt="Tsunoda" class="driver-image">
                </div>
                <div class="team-logo">
                    <a href="https://www.visacashrbracing.com" class="logo-link">
                        <img src="images/logos/rb.png" alt="RB" class="logo-image">
                    </a>
                </div>
                <div class="driver driver-right">
                    <img src="images/drivers/hadjar.png" alt="Hadjar" class="driver-image">
                </div>
            </div>
            <div class="names-row">
                <div class="name-left">TSUNODA</div>
                <div class="name-right">HADJAR</div>
            </div>
        </div>
        
        <!-- Williams -->
        <div class="team-section">
            <div class="team-row williams">
                <div class="driver driver-left">
                    <img src="images/drivers/albon.png" alt="Albon" class="driver-image">
                </div>
                <div class="team-logo">
                    <a href="https://www.williamsf1.com" class="logo-link">
                        <img src="images/logos/williams.png" alt="Williams" class="logo-image">
                    </a>
                </div>
                <div class="driver driver-right">
                    <img src="images/drivers/sainz.png" alt="Sainz" class="driver-image">
                </div>
            </div>
            <div class="names-row">
                <div class="name-left">ALBON</div>
                <div class="name-right">SAINZ</div>
            </div>
        </div>
        
        <!-- Stake -->
        <div class="team-section">
            <div class="team-row stake">
                <div class="driver driver-left">
                    <img src="images/drivers/hulkenberg.png" alt="Hulkenberg" class="driver-image">
                </div>
                <div class="team-logo">
                    <a href="https://www.stakef1team.com" class="logo-link">
                        <img src="images/logos/stake.png" alt="Stake" class="logo-image">
                    </a>
                </div>
                <div class="driver driver-right">
                    <img src="images/drivers/bortoleto.png" alt="Bortoleto" class="driver-image">
                </div>
            </div>
            <div class="names-row">
                <div class="name-left">HULKENBERG</div>
                <div class="name-right">BORTOLETO</div>
            </div>
        </div>
        
        <!-- Haas -->
        <div class="team-section">
            <div class="team-row haas">
                <div class="driver driver-left">
                    <img src="images/drivers/bearman.png" alt="Bearman" class="driver-image">
                </div>
                <div class="team-logo">
                    <a href="https://www.haasf1team.com" class="logo-link">
                        <img src="images/logos/haas.png" alt="Haas" class="logo-image">
                    </a>
                </div>
                <div class="driver driver-right">
                    <img src="images/drivers/ocon.png" alt="Ocon" class="driver-image">
                </div>
            </div>
            <div class="names-row">
                <div class="name-left">BEARMAN</div>
                <div class="name-right">OCON</div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
